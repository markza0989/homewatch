{% extends "base.html" %}
{% block title %}Too many requests · HomeWatch{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="alert alert-warning" role="alert">
      <h1 class="h4">Too many requests</h1>
      <p class="mb-0">
        You've made too many attempts in a short time. This limit protects the
        login form against brute-force guessing. Please wait a minute and try again.
      </p>
    </div>
  </div>
</div>
{% endblock %}
