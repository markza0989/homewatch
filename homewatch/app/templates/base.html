<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HomeWatch{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('dashboard.index') }}">
        🛰️ HomeWatch
      </a>
      <div class="d-flex align-items-center gap-3">
        {% if current_user.is_authenticated %}
          <a class="nav-link d-inline" href="{{ url_for('dashboard.index') }}">Dashboard</a>
          <a class="nav-link d-inline" href="{{ url_for('events.index') }}">Events</a>
          <a class="nav-link d-inline" href="{{ url_for('events.audit') }}">Audit</a>
          <span class="navbar-text">{{ current_user.username }}</span>
          <form method="post" action="{{ url_for('auth.logout') }}" class="m-0">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Log out</button>
          </form>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
</body>
</html>
